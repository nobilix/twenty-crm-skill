name: validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate SKILL.md frontmatter
        run: python3 .github/scripts/validate_skill.py skills/twenty-crm

      - name: Syntax-check scripts
        run: node --check skills/twenty-crm/scripts/twenty.mjs

      - name: Verify executable bits on scripts
        run: |
          missing=0
          for f in skills/twenty-crm/scripts/*.mjs; do
            if [ ! -x "$f" ]; then
              echo "::error file=$f::script is not executable (chmod +x)"
              missing=1
            fi
          done
          exit $missing

      - name: Verify marketplace.json is valid JSON
        run: python3 -m json.tool .claude-plugin/marketplace.json > /dev/null
